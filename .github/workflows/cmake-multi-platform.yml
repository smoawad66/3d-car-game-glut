name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    ## 1. INSTALL LINUX DEPENDENCIES (APT)
    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev freeglut3-dev libsdl2-dev libsdl2-mixer-dev

    ## 2. INSTALL WINDOWS DEPENDENCIES (VCPKG)
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: vcpkg install freeglut sdl2 sdl2-mixer --triplet x64-windows

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    ## 3. CONFIGURE CMAKE (UBUNTU)
    - name: Configure CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    ## 4. CONFIGURE CMAKE (WINDOWS)
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
      continue-on-error: true

## 6. PACKAGE WINDOWS BUILD (WITH ALL DLLs - COMPREHENSIVE)
    - name: Package Windows Build
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path package
        Copy-Item "${{ steps.strings.outputs.build-output-dir }}/Release/car_game.exe" -Destination package/
        Copy-Item -Recurse "${{ steps.strings.outputs.build-output-dir }}/assets" -Destination package/
        
        # Copy ALL DLLs from vcpkg bin directory
        $vcpkgBin = "C:/vcpkg/installed/x64-windows/bin"
        Write-Host "Copying all DLLs from $vcpkgBin"
        Get-ChildItem "$vcpkgBin/*.dll" | ForEach-Object {
          Copy-Item $_.FullName -Destination package/
          Write-Host "  Copied: $($_.Name) ($([math]::Round($_.Length/1KB, 2)) KB)"
        }
        
        Write-Host "`nPackage contents:"
        Get-ChildItem package/ -Recurse | Format-Table Name, Length
        
        # Create zip (force overwrite if exists)
        Compress-Archive -Path package/* -DestinationPath "CarGame-${{ matrix.os }}-${{ matrix.c_compiler }}.zip" -Force
        
        $zipSize = (Get-Item "CarGame-${{ matrix.os }}-${{ matrix.c_compiler }}.zip").Length
        Write-Host "`nCreated zip file: $([math]::Round($zipSize/1MB, 2)) MB"
        
            
    ## 7. UPLOAD ARTIFACTS
    - name: Upload Game Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarGame-${{ matrix.os }}-${{ matrix.c_compiler }}
        if-no-files-found: ignore
        path: |
          CarGame-${{ matrix.os }}-${{ matrix.c_compiler }}.tar.gz
          CarGame-${{ matrix.os }}-${{ matrix.c_compiler }}.zip

  ## 8. CREATE RELEASE (when tag is pushed)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*.tar.gz
          artifacts/**/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}