name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    ## 1. INSTALL LINUX DEPENDENCIES (APT)
    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev freeglut3-dev libsdl2-dev libsdl2-mixer-dev

    ## 2. INSTALL WINDOWS DEPENDENCIES (VCPKG)
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: vcpkg install freeglut sdl2 sdl2-mixer --triplet x64-windows

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    ## 3. CONFIGURE CMAKE (UBUNTU)
    - name: Configure CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    ## 4. CONFIGURE CMAKE (WINDOWS)
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
      
    - name: Upload Game Artifact
      uses: actions/upload-artifact@v4
      with:
        # Give each upload a unique name based on the OS and compiler
        name: CarGame-${{ matrix.os }}-${{ matrix.c_compiler }}
        # Suppress warnings for paths that don't exist on the current OS
        if-no-files-found: ignore
        path: |
          # The Linux executable
          ${{ steps.strings.outputs.build-output-dir }}/car_game
          # The Windows executable (MSVC puts this in a Release subfolder)
          ${{ steps.strings.outputs.build-output-dir }}/Release/car_game.exe
          # Your game's assets folder
          ${{ steps.strings.outputs.build-output-dir }}/assets/
