name: Build Windows

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    ## 1. ENABLE VCPKG BINARY CACHING (native GitHub Actions integration)
    - name: Export GitHub Actions cache variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Set up vcpkg binary caching
      shell: bash
      run: |
        echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $GITHUB_ENV

    ## 2. INSTALL DEPENDENCIES (cached automatically after first run)
    - name: Install dependencies (Windows)
      run: vcpkg install freeglut sdl2 sdl2-mixer --triplet x64-windows


    ## 3. SET BUILD PATHS
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    ## 4. CONFIGURE CMAKE
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=cl
        -DCMAKE_C_COMPILER=cl
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
        -S ${{ github.workspace }}

    ## 5. BUILD
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

    ## 6. PACKAGE
    - name: Package Windows Build
      shell: pwsh
      run: |

        New-Item -ItemType Directory -Force -Path "Car Game"

        Copy-Item "${{ steps.strings.outputs.build-output-dir }}/Release/car_game.exe" -Destination "Car Game/"
        Copy-Item -Recurse "${{ steps.strings.outputs.build-output-dir }}/assets" -Destination "Car Game/"

        $vcpkgBin = "C:/vcpkg/installed/x64-windows/bin"
        Get-ChildItem "$vcpkgBin/*.dll" | ForEach-Object {
          Copy-Item $_.FullName -Destination "Car Game/"
        }

        Write-Host "Car Game/ contents:"
        Get-ChildItem "Car Game/" -Recurse | Format-Table Name, Length

        Compress-Archive -Path "Car Game" -DestinationPath "Car_Game_v1.0.zip" -Force

        $zipSize = (Get-Item "Car_Game_v1.0.zip").Length
        Write-Host "Created zip: $([math]::Round($zipSize/1MB, 2)) MB"

    ## 7. UPLOAD ARTIFACT
    - name: Upload Game Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Car_Game_v1.0
        if-no-files-found: error
        path: Car_Game_v1.0.zip